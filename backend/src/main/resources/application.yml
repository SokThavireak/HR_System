server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:hrmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: hrms-demo-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-ok
    expiration: 86400000   # 24 hours
